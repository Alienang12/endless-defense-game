<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>无尽守线</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="无尽守线">
      <section class="stage" aria-label="战场">
        <canvas id="gameCanvas"></canvas>

        <div class="topbar">
          <div class="metric">
            <span>金币</span>
            <strong id="coinText">0</strong>
          </div>
          <div class="metric">
            <span>领地</span>
            <strong id="territoryText">1</strong>
          </div>
          <div class="metric">
            <span>波次</span>
            <strong id="waveText">1</strong>
          </div>
          <div class="metric metric-wide">
            <span>城门</span>
            <strong id="baseText">500/500</strong>
          </div>
          <button class="icon-btn" id="pauseBtn" type="button" aria-label="暂停">
            <span id="pauseIcon">II</span>
          </button>
          <button class="icon-btn" id="speedBtn" type="button" aria-label="切换速度">1x</button>
        </div>

        <div class="wave-ribbon" id="waveRibbon">第 1 波</div>
        <div class="toast" id="toast" aria-live="polite"></div>

        <div class="game-over" id="gameOver" hidden>
          <div class="end-panel">
            <p class="end-kicker">城门失守</p>
            <h1 id="endTitle">守到第 1 波</h1>
            <p id="endStats">击败 0 个敌人</p>
            <button id="restartBtn" type="button">重新开始</button>
          </div>
        </div>
      </section>

      <section class="command-panel" aria-label="指挥区">
        <div class="version-banner">
          <strong id="versionText">V9 大扩展版</strong>
          <span>主动战术 · 遗物 · 奇遇 · 天气 · 异变</span>
        </div>

        <div class="tactic-grid tactic-grid-featured" aria-label="战术技能">
          <button class="tactic-btn" id="stormBtn" type="button">
            <strong>雷令</strong>
            <small id="stormStatus">30 能量</small>
          </button>
          <button class="tactic-btn" id="frostBtn" type="button">
            <strong>霜阵</strong>
            <small id="frostStatus">24 能量</small>
          </button>
          <button class="tactic-btn" id="rallyBtn" type="button">
            <strong>战鼓</strong>
            <small id="rallyStatus">22 能量</small>
          </button>
          <button class="tactic-btn" id="mineBtn" type="button">
            <strong>火雷</strong>
            <small id="mineStatus">26 能量</small>
          </button>
        </div>

        <div class="intel-panel">
          <span id="energyText">能量 0/100</span>
          <span id="weatherText">天气 平稳</span>
          <span id="synergyText">羁绊 未成阵</span>
          <span id="relicText">遗物 0</span>
          <span id="objectiveText">目标 守住下一波</span>
          <span id="achievementText">战功 0</span>
        </div>

        <div class="shop-grid">
          <button class="shop-card" type="button" data-buy="rifle">
            <span class="unit-mark rifle-mark"></span>
            <strong>步枪兵</strong>
            <small id="cost-rifle">60</small>
          </button>
          <button class="shop-card" type="button" data-buy="guard">
            <span class="unit-mark guard-mark"></span>
            <strong>盾卫</strong>
            <small id="cost-guard">90</small>
          </button>
          <button class="shop-card" type="button" data-buy="medic">
            <span class="unit-mark medic-mark"></span>
            <strong>木医师</strong>
            <small id="cost-medic">120</small>
          </button>
          <button class="shop-card" type="button" data-buy="mage">
            <span class="unit-mark mage-mark"></span>
            <strong>水术士</strong>
            <small id="cost-mage">150</small>
          </button>
          <button class="shop-card" type="button" data-buy="turret">
            <span class="unit-mark turret-mark"></span>
            <strong>火炮台</strong>
            <small id="cost-turret">180</small>
          </button>
        </div>

        <div class="status-strip">
          <span id="capText">兵力 0/12</span>
          <span id="techStatusText">科技 0/1</span>
          <span id="selectedText">未选中</span>
          <span id="giftText">补给 3波</span>
          <span id="bestText">最佳 0</span>
        </div>

        <div class="action-grid">
          <button class="action-btn" id="upgradeSelectedBtn" type="button">升级选中</button>
          <button class="action-btn" id="techBtn" type="button">科技</button>
          <button class="action-btn" id="claimBtn" type="button">推进领地</button>
        </div>

        <div class="save-grid">
          <button class="save-btn" id="saveBtn" type="button">保存</button>
          <button class="save-btn" id="exportBtn" type="button">导出</button>
          <button class="save-btn" id="importBtn" type="button">导入</button>
        </div>
      </section>

      <div class="choice-modal" id="choiceModal" hidden>
        <div class="choice-panel">
          <p class="choice-kicker" id="choiceTitle">请选择能力加成</p>
          <div class="choice-grid" id="choiceGrid"></div>
          <p class="choice-note" id="choiceNote">能力加成按 750、1000、1500 金币逐步递增</p>
        </div>
      </div>

      <div class="save-modal" id="saveModal" hidden>
        <div class="save-panel">
          <p class="choice-kicker" id="saveTitle">存档</p>
          <textarea id="saveText" spellcheck="false"></textarea>
          <div class="save-modal-actions">
            <button id="copySaveBtn" type="button">复制</button>
            <button id="loadSaveBtn" type="button">读取</button>
            <button id="closeSaveBtn" type="button">关闭</button>
          </div>
        </div>
      </div>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
