<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>三国阵战 S1</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="三国阵战策略原型">
      <section class="stage" aria-label="战场">
        <canvas id="battleCanvas"></canvas>

        <div class="topbar" aria-label="军政资源">
          <div class="metric">
            <span class="resource-icon city-icon" aria-hidden="true"></span>
            <span>城池</span>
            <strong id="cityText">新野</strong>
          </div>
          <div class="metric">
            <span class="resource-icon people-icon" aria-hidden="true"></span>
            <span>人口</span>
            <strong id="populationText">18</strong>
          </div>
          <div class="metric">
            <span class="resource-icon grain-icon" aria-hidden="true"></span>
            <span>粮草</span>
            <strong id="grainText">120</strong>
          </div>
          <div class="metric">
            <span class="resource-icon arms-icon" aria-hidden="true"></span>
            <span>军械</span>
            <strong id="armsText">80</strong>
          </div>
          <div class="metric">
            <span class="resource-icon morale-icon" aria-hidden="true"></span>
            <span>士气</span>
            <strong id="moraleText">70</strong>
          </div>
          <button class="icon-btn" id="pauseBtn" type="button" aria-label="暂停">
            <span id="pauseIcon">II</span>
          </button>
          <button class="icon-btn" id="speedBtn" type="button" aria-label="切换速度">1x</button>
        </div>

        <div class="battle-ribbon" id="battleRibbon">布阵阶段</div>
        <div class="toast" id="toast" aria-live="polite"></div>

        <div class="result-modal" id="resultModal" hidden>
          <div class="result-panel">
            <p id="resultKicker">战斗结束</p>
            <h1 id="resultTitle">胜负未分</h1>
            <p id="resultText">调整阵容后再战。</p>
            <div class="result-actions">
              <button id="nextStageBtn" type="button">下一关</button>
              <button id="retryBtn" type="button">再战一场</button>
            </div>
          </div>
        </div>
      </section>

      <section class="command-panel" aria-label="指挥区">
        <div class="version-banner">
          <strong>S1 三国阵战原型</strong>
          <span>左右对阵 · 武将带兵 · 阵法地形克制</span>
        </div>

        <div class="battle-card">
          <div>
            <strong id="stageTitle">博望坡伏击</strong>
            <span id="stageMeta">森林 · 蜀 vs 魏</span>
          </div>
          <div class="power-row">
            <span id="allyPowerText">蜀军 0</span>
            <span id="enemyPowerText">魏军 0</span>
          </div>
        </div>

        <div class="side-tabs" aria-label="指挥页签">
          <button class="side-tab active" type="button" data-tab="roster">阵容</button>
          <button class="side-tab" type="button" data-tab="formation">阵法</button>
          <button class="side-tab" type="button" data-tab="campaign">关卡</button>
          <button class="side-tab" type="button" data-tab="report">战报</button>
        </div>

        <div class="side-panel active" data-panel="roster">
          <div class="section-title">
            <strong>蜀军武将</strong>
            <span id="selectedText">已选 5/5</span>
          </div>
          <div class="roster-grid" id="rosterGrid"></div>
          <button class="primary-action" id="startBtn" type="button">开战</button>
        </div>

        <div class="side-panel" data-panel="formation">
          <div class="section-title">
            <strong>阵法盘</strong>
            <span id="formationText">当前：锋矢阵</span>
          </div>
          <div class="formation-grid" id="formationGrid"></div>
          <div class="terrain-card" id="terrainCard"></div>
        </div>

        <div class="side-panel" data-panel="campaign">
          <div class="section-title">
            <strong>蜀魏战役</strong>
            <span id="campaignText">第 1/5 关</span>
          </div>
          <div class="stage-grid" id="stageGrid"></div>
        </div>

        <div class="side-panel" data-panel="report">
          <div class="section-title">
            <strong>克制战报</strong>
            <span>最近 8 条关键影响</span>
          </div>
          <div class="counter-board" id="counterBoard"></div>
          <div class="log-list" id="logList"></div>
        </div>

        <div class="save-grid">
          <button class="save-btn" id="saveBtn" type="button">保存</button>
          <button class="save-btn" id="exportBtn" type="button">导出</button>
          <button class="save-btn" id="importBtn" type="button">导入</button>
        </div>
      </section>

      <div class="save-modal" id="saveModal" hidden>
        <div class="save-panel">
          <p id="saveTitle">存档</p>
          <textarea id="saveText" spellcheck="false"></textarea>
          <div class="save-modal-actions">
            <button id="copySaveBtn" type="button">复制</button>
            <button id="loadSaveBtn" type="button">读取</button>
            <button id="closeSaveBtn" type="button">关闭</button>
          </div>
        </div>
      </div>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
